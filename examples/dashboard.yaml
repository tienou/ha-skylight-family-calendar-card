# ==============================================================================
#  SKYLIGHT FAMILY CALENDAR - DASHBOARD EXAMPLE
# ==============================================================================
#  This is a minimal example dashboard for the Skylight Family Calendar Card.
#
#  The card handles everything natively:
#    - Event creation, editing, and deletion (built-in forms)
#    - Calendar filter buttons (legend toggle)
#    - View selector (Today, Tomorrow, Week, 2 Weeks, Month)
#    - Weather display per day
#    - Recurrence support (daily, weekly, monthly, yearly)
#    - Notification markers (🔔 prefix in event title)
#    - Google Places autocomplete for location field
#    - Multi-language support (en, fr, de, es, it, nl, pt)
#
#  No external helpers, scripts, or popup cards are needed.
# ==============================================================================

views:
  - type: sections
    max_columns: 10
    title: Family Calendar
    path: family-calendar
    sections:
      # --- CALENDAR CARD ---
      - type: grid
        cards:
          - type: custom:skylight-family-calendar-card
            title: Family Calendar
            locale: fr                  # Language: en, fr, de, es, it, nl, pt
            defaultView: Month          # Default view: Today, Tomorrow, Week, Biweek, Month
            startingDay: monday         # First day of week: monday, today, etc.
            showHeader: true            # Show date/time/weather header
            showNavigation: true        # Show month/week navigation arrows
            showWeekDayText: true       # Show day column headers (Mon, Tue...)
            showTime: true              # Show event start/end time
            showLocation: true          # Show event location
            showLocationInForm: true    # Show location field in create/edit forms
            compact: true               # Compact display mode
            colorFullEvent: true        # Color full event background
            hidePastEvents: false
            hideWeekend: false
            combineSimilarEvents: true
            updateInterval: 60          # Auto-refresh interval in seconds

            # --- WEATHER ---
            weather:
              entity: weather.home      # <--- UPDATE THIS ENTITY
              showCondition: true
              showTemperature: true
              showLowTemperature: true
              useTwiceDaily: false

            # --- CALENDARS ---
            # Map your calendar entities here. Colors are auto-assigned if not set.
            calendars:
              - entity: calendar.family         # <--- UPDATE THIS ENTITY
                name: Family
                color: "#4A90E2"
              - entity: calendar.member1        # <--- UPDATE THIS ENTITY
                name: Member 1
                color: "#E27D4A"
              - entity: calendar.member2        # <--- UPDATE THIS ENTITY
                name: Member 2
                color: "#7DE24A"
              - entity: calendar.member3        # <--- UPDATE THIS ENTITY
                name: Member 3
                color: "#E24A90"
              - entity: calendar.birthdays      # <--- UPDATE THIS ENTITY
                name: Birthdays
                color: "#33a02c"
                icon: mdi:cake-variant
              - entity: calendar.holidays       # <--- UPDATE THIS ENTITY
                name: Holidays
                color: "#ff7f00"
                icon: mdi:bag-personal

            # --- GOOGLE PLACES (optional) ---
            # googleApiKey: YOUR_GOOGLE_API_KEY

            # --- VIEWS (optional) ---
            # Restrict which view buttons appear:
            # views: Week,Month

            # --- DEFAULT CALENDAR (optional) ---
            # Pre-select this calendar when creating events:
            # defaultCalendar: calendar.family

        column_span: 10

    # --- DASHBOARD BACKGROUND (optional) ---
    # Upload calbackgrd.png to your /config/www/ folder.
    # background:
    #   opacity: 62
    #   alignment: center
    #   size: cover
    #   image: /local/calbackgrd.png
