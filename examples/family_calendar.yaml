# ==============================================================================
#  SKYLIGHT FAMILY CALENDAR - OPTIONAL HA PACKAGE
# ==============================================================================
#  NOTE: This package is OPTIONAL. The card handles event creation, editing,
#  and deletion natively — no scripts or helpers are needed for basic usage.
#
#  This file is only useful if you want:
#    - 🔔 Voice/phone notification automation triggered by the bell marker
#    - Custom automations based on calendar events
#
#  INSTRUCTIONS:
#  1. Place this file in your /config/packages/ folder.
#  2. Ensure your configuration.yaml has:
#     homeassistant:
#       packages: !include_dir_named packages
#  3. RESTART Home Assistant.
# ==============================================================================

# ==============================================================================
#  🔔 NOTIFICATION AUTOMATION
# ==============================================================================
#  When an event has the 🔔 marker (checkbox in the card), this automation
#  sends a voice notification and/or phone notification.
#
#  The card stores the marker as a "🔔 " prefix in the event title (summary).
#  Your automation can detect it with:
#    trigger.event.data.summary starts with "🔔"
#
#  Example automation (customize to your needs):
# ==============================================================================

automation:
  - alias: "Calendar - Voice & Phone Notification"
    description: "Send voice/phone notification for events marked with 🔔"
    trigger:
      - platform: calendar
        event: start
        offset: "-00:15:00"    # 15 minutes before event starts
        entity_id:
          - calendar.family    # <--- UPDATE THESE ENTITIES
          # - calendar.member1
          # - calendar.member2
    condition:
      - condition: template
        value_template: "{{ trigger.calendar_event.summary.startswith('🔔') }}"
    action:
      # --- Option 1: TTS Voice Notification (e.g., Google Home, Alexa) ---
      - action: tts.speak
        target:
          entity_id: media_player.living_room_speaker  # <--- UPDATE THIS ENTITY
        data:
          message: >
            Rappel : {{ trigger.calendar_event.summary.replace('🔔 ', '') }}
            dans 15 minutes.

      # --- Option 2: Mobile Phone Notification ---
      - action: notify.mobile_app_your_phone              # <--- UPDATE THIS ENTITY
        data:
          title: "🔔 Rappel calendrier"
          message: >
            {{ trigger.calendar_event.summary.replace('🔔 ', '') }}
            commence à {{ trigger.calendar_event.start.strftime('%H:%M') }}
          data:
            tag: "calendar-reminder"
            importance: high
